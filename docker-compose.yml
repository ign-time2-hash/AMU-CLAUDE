services:
  postgres:
    image: postgres:16-alpine
    container_name: amu-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: amu
    volumes:
      - amu_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d amu"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  amu_postgres_data: